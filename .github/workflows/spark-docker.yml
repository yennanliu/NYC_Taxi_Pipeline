name: Spark Docker Build & Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t spark-pipeline:test .

    - name: Verify Spark installation in Docker
      run: docker run --rm spark-pipeline:test ls -la /opt/spark/bin/ | head -5

    - name: Test Docker image
      run: |
        docker run --rm spark-pipeline:test bash -c "echo '✓ Docker image with Spark is ready'"
        echo "✓ CI/CD pipeline complete"
