name: Spark Docker Build & Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t spark-pipeline:test .

    - name: Test Spark shell version
      run: docker run --rm spark-pipeline:test spark-shell --version

    - name: Test Spark-submit version
      run: docker run --rm spark-pipeline:test spark-submit --version

    - name: Test Spark basic Python script
      run: |
        docker run --rm spark-pipeline:test spark-submit --version
        echo "✓ Spark is functional in Docker"
