name: Scala CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 1.8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
    - name: Cache sbt
      uses: actions/cache@v3
      with:
        path: |
          ~/.sbt
          ~/.ivy2/cache
          ~/.coursier/cache/v1
        key: ${{ runner.os }}-sbt-${{ hashFiles('build.sbt') }}
    - name: Download and setup sbt
      run: |
        curl -fsSL "https://github.com/sbt/sbt/releases/download/v1.9.0/sbt-1.9.0.tgz" | tar xfz - -C /tmp
        export PATH="/tmp/sbt/bin:$PATH"
        which sbt
    - name: Build assembly JAR
      run: |
        export PATH="/tmp/sbt/bin:$PATH"
        /tmp/sbt/bin/sbt assembly